<!DOCTYPE html>
<html>
<body>
    <h1>Control de Tiempo mBot</h1>
    <button type="button" onclick="init()">Iniciar Cámara</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
    
    <!-- Aquí mostraremos el tiempo corriendo -->
    <h2 id="timer">Tiempo: 0.00s</h2>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/vtm3GalAc/";
        let model, webcam, labelContainer, maxPredictions;
        
        let startTime = 0;
        let isRunning = false;
        let canDetect = true; // Variable para el bloqueo de 5 segundos
        let timerInterval;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(200, 200, true);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            // Asumimos que la clase "mbot" es la primera (índice 0)
            let mbotProb = prediction[0].probability;

            if (mbotProb > 0.90 && canDetect) {
                if (!isRunning) {
                    // INICIAR CRONÓMETRO
                    isRunning = true;
                    startTime = Date.now();
                    timerInterval = setInterval(updateDisplay, 100);
                    
                    // Activar bloqueo de 5 segundos
                    canDetect = false;
                    setTimeout(() => { canDetect = true; }, 5000);
                } else {
                    // DETENER CRONÓMETRO (segunda detección)
                    isRunning = false;
                    clearInterval(timerInterval);
                    canDetect = false; // Bloquear para no reiniciar inmediatamente
                    setTimeout(() => { canDetect = true; }, 5000);
                }
            }

            // Mostrar probabilidades en pantalla
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.childNodes[i].innerHTML = prediction[i].className + ": " + prediction[i].probability.toFixed(2);
            }
        }

        function updateDisplay() {
            let elapsed = (Date.now() - startTime) / 1000;
            document.getElementById("timer").innerHTML = "Tiempo: " + elapsed.toFixed(1) + "s";
        }
    </script>
</body>
</html>
