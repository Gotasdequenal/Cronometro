<!DOCTYPE html>
<html>
<head>
    <style>
        /* Estilo para la etiqueta de versión */
        .version-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #eee;
            padding: 5px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Etiqueta de versión para saber si GitHub actualizó -->
    <div class="version-tag">v1.0.2</div>

    <h1>Control de Tiempo mBot</h1>
    <button type="button" onclick="init()">Iniciar Cámara</button>
    <button type="button" onclick="resetTimer()">Resetear Cronómetro</button>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>
    
    <h2 id="timer">Tiempo: 0.00s</h2>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/vtm3GalAc/";
        let model, webcam, labelContainer, maxPredictions;
        
        let startTime = 0;
        let isRunning = false;
        let canDetect = true; 
        let timerInterval;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(200, 200, true);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let mbotProb = prediction[0].probability; // Clase mbot

            if (mbotProb > 0.90 && canDetect) {
                if (!isRunning) {
                    // INICIAR
                    isRunning = true;
                    startTime = Date.now();
                    timerInterval = setInterval(updateDisplay, 100);
                    canDetect = false;
                    setTimeout(() => { canDetect = true; }, 5000);
                } else {
                    // DETENER
                    isRunning = false;
                    clearInterval(timerInterval);
                    canDetect = false;
                    setTimeout(() => { canDetect = true; }, 5000);
                }
            }

            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.childNodes[i].innerHTML = prediction[i].className + ": " + prediction[i].probability.toFixed(2);
            }
        }

        function updateDisplay() {
            let elapsed = (Date.now() - startTime) / 1000;
            document.getElementById("timer").innerHTML = "Tiempo: " + elapsed.toFixed(1) + "s";
        }

        function resetTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            document.getElementById("timer").innerHTML = "Tiempo: 0.00s";
            canDetect = true;
        }
    </script>
</body>
</html>
